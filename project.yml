name: iNetPeek
options:
  bundleIdPrefix: com.smartfull
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  iNetPeek:
    type: application
    platform: macOS
    sources:
      - path: iNetPeek
        excludes:
          - "Info.plist"
          - "iNetPeek.entitlements"
    info:
      path: iNetPeek/Info.plist
      properties:
        CFBundleDisplayName: iNetPeek
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: 1
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Smartfull"
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    entitlements:
      path: iNetPeek/iNetPeek.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartfull.inetpeek
        PRODUCT_NAME: iNetPeek
        INFOPLIST_FILE: iNetPeek/Info.plist
        CODE_SIGN_ENTITLEMENTS: iNetPeek/iNetPeek.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
